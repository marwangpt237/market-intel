name: Market-Intel Algeria E-commerce

on:
  schedule:
    # Every 12 hours
    - cron: '45 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run Market-Intel (algeria_ecom profile)
        run: python main.py --profile algeria_ecom
        env:
          MARKET_INTEL_PROFILE: algeria_ecom

      - name: Commit Algeria e-commerce intelligence
        run: |
          git config user.name "Market-Intel Bot"
          git config user.email "actions@github.com"
          git add data/ reports/ actions/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Market-Intel (algeria_ecom): product intelligence scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
